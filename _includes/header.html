<!-- ============================================================
     header.html — En-tête et navigation principale
     ============================================================ -->
{% assign g = site.data.global %}
{% assign nav = site.data.navigation.main %}

<!-- Skip to main content (accessibilité) -->
<a href="#main-content" class="skip-link">Aller au contenu principal</a>

<header class="site-header" id="site-header" role="banner">
  <div class="header-inner container">

    <!-- Logo -->
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ g.brand.name }} — Accueil">
      <span class="logo-dj">DJ</span><span class="logo-film">film</span>
    </a>

    <!-- Navigation principale -->
    <nav class="site-nav" id="site-nav" aria-label="Navigation principale">
      <ul class="nav-list" role="list">
        {% for item in nav %}
        <li class="nav-item{% if item.cta %} nav-item--cta{% endif %}">
          <a
            href="{{ item.url | relative_url }}"
            class="nav-link{% if item.cta %} btn btn--outline-gold{% endif %}{% if page.url == item.url %} is-active{% endif %}"
            {% if page.url == item.url %}aria-current="page"{% endif %}
          >{{ item.label }}</a>
        </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- Bouton menu mobile -->
    <button
      class="nav-toggle"
      id="nav-toggle"
      aria-controls="site-nav"
      aria-expanded="false"
      aria-label="Ouvrir le menu"
    >
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

  </div>
</header>
